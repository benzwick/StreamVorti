# Run StreamVorti_par examples using pre-built ECL binaries
#
# Downloads compiled binaries and runs parallel demos with mpirun.
# All results are saved as downloadable artifacts.

name: Run Examples (Parallel)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build StreamVorti with ECL"]
    types: [completed]

jobs:
  run-demo:
    name: "Demo (np=4): ${{ matrix.name }}"
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ matrix.timeout || 5 }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cavity
            file: demo/cavity.lisp
            validate: ghia
            timeout: 10
          - name: cavity-quick
            file: demo/cavity-quick.lisp
          - name: poiseuille
            file: demo/poiseuille.lisp
            validate: poiseuille

    steps:
    - uses: actions/checkout@v4

    - name: Download binaries (from triggering workflow)
      if: ${{ github.event_name == 'workflow_run' }}
      uses: actions/download-artifact@v4
      with:
        name: streamvorti-ecl-binaries-ubuntu-22.04
        path: bin
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download binaries (manual trigger - get latest)
      if: ${{ github.event_name == 'workflow_dispatch' }}
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: build-from-source-with-ecl.yml
        name: streamvorti-ecl-binaries-ubuntu-22.04
        path: bin

    - name: Install runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sbcl gnuplot libsuitesparse-dev libopenmpi-dev ecl

    - name: Run demo (parallel, np=4)
      run: |
        set -o pipefail
        chmod +x bin/StreamVorti_par
        mkdir -p results
        cd results
        mpirun --oversubscribe -np 4 ../bin/StreamVorti_par -f ../${{ matrix.file }} -lp ../lisp -pv 2>&1 | tee simulation.log

    - name: Validate against Ghia
      if: ${{ matrix.validate == 'ghia' }}
      run: |
        set -o pipefail
        sbcl --non-interactive \
             --load lisp/compare-ghia.lisp \
             --eval '(unless (streamvorti.validation:run-validation :results-file "results/output_dat/lid-driven-cavity_u_centerline_x0.5.dat") (sb-ext:exit :code 1))' \
             2>&1 | tee results/validation.log

    - name: Validate against exact Poiseuille solution
      if: ${{ matrix.validate == 'poiseuille' }}
      run: |
        set -o pipefail
        sbcl --non-interactive \
             --load lisp/compare-poiseuille.lisp \
             --eval '(unless (streamvorti.poiseuille:run-validation :results-file "results/output_dat/poiseuille-flow_u_centerline_x0.5.dat") (sb-ext:exit :code 1))' \
             2>&1 | tee results/validation.log

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: demo-parallel-${{ matrix.name }}-results
        path: |
          results/
          ${{ matrix.file }}
          data/
        retention-days: 5
