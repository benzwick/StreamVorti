spack:
  specs:
  - mfem@4.8 +mpi +metis +lapack +zlib ^openmpi ^hypre+mpi ^metis+int64 ^suite-sparse
  - cgal@6.0
  - eigen@3.4
  - cmake@3.30.9
  - openmpi
  - suite-sparse

  # Pin target architecture to x86_64_v3 (AVX2/Haswell) so that Spack
  # binaries are portable across GitHub Actions runners. Without this,
  # Spack auto-detects the CPU (e.g. icelake) and the cached binaries
  # crash with "Illegal instruction" on runners with older CPUs.
  packages:
    all:
      target: [x86_64_v3]

  view: true

  concretizer:
    unify: true
